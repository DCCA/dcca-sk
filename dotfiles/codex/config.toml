# Base portatil do Codex (dcca-sk). So a config que viaja entre maquinas:
# sem [projects] (trust list e por-maquina), sem paths de maquina. O install.sh
# SEMEIA isto so quando ~/.codex/config.toml nao existe - nunca sobrescreve o seu
# config vivo (mode=seed no manifest), e o capture.sh nao mexe no codex.

model = "gpt-5.4"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"

# MCP servers portateis (npx/url). O 'pencil' fica de fora: aponta pra um binario
# de extensao do VS Code, especifico da maquina/versao.
[mcp_servers.excalidraw]
command = "npx"
args = ["-y", "excalidraw-mcp"]

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.shadcn]
command = "npx"
args = ["shadcn@latest", "mcp"]

[features]
hooks = true
multi_agent = true
prevent_idle_sleep = true
